services:
  mongodb:
    image: mongo:6
    container_name: kairix-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - kairix-network

  backend:
    build:
      context: ./backend
    container_name: kairix-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/KairiX
      - JWT_SECRET=your_docker_jwt_secret_key_change_in_production
      - NODE_ENV=production
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - kairix-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: kairix-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kairix-network

volumes:
  mongo-data:

networks:
  kairix-network:
    driver: bridge
